name: productos-nestjs-app
services:
  nats-server:
    image: nats:2.12.7-alpine
    ports:
      # - "4222:4222"
      # 8222 es el puerto de monitoreo del servidor NATS, que proporciona una interfaz web para supervisar el estado del servidor, ver estadísticas y realizar tareas administrativas. Al exponer este puerto, puedes acceder a la interfaz de monitoreo desde tu navegador web utilizando la dirección http://localhost:8222.
      - "8222:8222"
  pedidos-database:
    container_name: pedidos-database
    image: postgres:17.2
    volumes:
      - ./pedidos-microservice/postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
      - POSTGRES_DB=pedidosdb
    ports:
      - '5432:5432'
    # para validar que la db realmente esta montada y lista para recibir conexiones, se puede usar el healthcheck, que es una funcionalidad de Docker que permite verificar la salud de un contenedor. En este caso, se utiliza el comando pg_isready para comprobar si la base de datos PostgreSQL está lista para aceptar conexiones. El healthcheck se configura con un intervalo de 5 segundos, un tiempo de espera de 5 segundos, un máximo de 10 reintentos y un período de inicio de 10 segundos.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pedidosdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  mongo-database:
    container_name: mongo-database
    image: mongo:8.0
    restart: always
    # Prisma con MongoDB requiere que la base de datos sea un replica set (incluso si es de un solo nodo).
    # --replSet rs0     => arranca el daemon como miembro del replica set "rs0"
    # --bind_ip_all     => acepta conexiones desde cualquier interfaz de red (necesario en Docker)
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      # persistimos los datos de mongo en una carpeta local, igual que hicimos con postgres
      - ./auth-microservice/mongo-data:/data/db
    ports:
      - '27017:27017'
    # healthcheck con doble función:
    #  1) Verifica que mongo esté vivo (rs.status())
    #  2) Auto-inicializa el replica set la primera vez (rs.initiate()) si todavía no existe.
    # Así no necesitamos un servicio "init" adicional para inicializar el replica set.
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try { rs.status().ok } catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo-database:27017' }] })
          }
        "
      interval: 10s
      timeout: 30s
      retries: 30
      start_period: 10s
  cliente-gateway:
    build: ./cliente-gateway
    ports:
      # - 3000:3000
      - ${CLIENT_GATEWAY_PORT}:3000
    volumes:
      - ./cliente-gateway/src:/usr/src/app/src
    command: npm run start:dev
    environment:
      - PORT=3000
      - NATS_SERVERS=nats://nats-server:4222
    depends_on:
      - nats-server
  productos-microservice:
    build: ./productos-microservice
    # comento el puerto porque no quiero que se tenga acceso a este microservicio desde fuera del entorno de Docker, ya que solo se comunica con el cliente-gateway a través de NATS. Al no exponer el puerto, se mejora la seguridad y se evita que otros servicios o usuarios externos puedan acceder directamente al microservicio de productos.
    # ports:
    #   - ${PRODUCTOS_MICROSERVICE_PORT}:3001
    volumes:
      - ./productos-microservice/src:/usr/src/app/src
      - ./productos-microservice/dev.db:/usr/src/app/dev.db
    command: npm run start:dev
    environment:
      - PORT=3001
      - NATS_SERVERS=nats://nats-server:4222
      - DATABASE_URL=file:./dev.db
    depends_on:
      - nats-server
  pedidos-microservice:
    build: ./pedidos-microservice
    # NO SE EXPORTA EL PUERTO YA QUE SOLO SE VA A ENTENER ACCESO A ESTE MICROSERVICIO DESDE EL CLIENTE-GATEWAY A TRAVES DE NATS, AL NO EXPOERLO SE MEJORA LA SEGURIDAD
    # ports:
    #   - ${PEDIDOS_MICROSERVICE_PORT}:3002
    volumes:
      - ./pedidos-microservice/src:/usr/src/app/src
    command: npm run start:dev
    environment:
      - PORT=3002
      - NATS_SERVERS=nats://nats-server:4222
      - DATABASE_URL=postgresql://postgres:12345@pedidos-database:5432/pedidosdb?schema=public
    depends_on:
      nats-server:
        condition: service_started
      pedidos-database:
      # lo siguiente es para garantizar que el servicio de pedidos-microservice solo se inicie después de que la base de datos esté completamente lista y saludable. Esto es importante porque el microservicio de pedidos depende de la base de datos para funcionar correctamente, y si intenta conectarse a la base de datos antes de que esté lista, podría fallar o generar errores.
        condition: service_healthy
  pagos-microservice:
    container_name: pagos-microservice
    build: ./pagos-microservice
    # aqui si expongo el puerto ya que este microservicio se comunica tanto con el cliente-gateway como con servicios externos como Stripe, 
    # se hace por que stripe cuando el cliente ya pago con la tarjeta, stripe hace una llamada a un endpoint de nuestro microservicio de pagos para notificar que el pago se realizo correctamente
    ports:
      - ${PAGOS_MICROSERVICE_PORT}:${PAGOS_MICROSERVICE_PORT}
    volumes:
      - ./pagos-microservice/src:/usr/src/app/src
    command: npm run start:dev
    environment:
      - PORT=${PAGOS_MICROSERVICE_PORT}
      - NATS_SERVERS=nats://nats-server:4222
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_ENDPOINT_SECRET=${STRIPE_ENDPOINT_SECRET}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL}
    depends_on:
      nats-server:
        condition: service_started
  auth-microservice:
    build: ./auth-microservice
    # NO SE EXPORTA EL PUERTO YA QUE SOLO SE VA A ENTENER ACCESO A ESTE MICROSERVICIO DESDE EL CLIENTE-GATEWAY A TRAVES DE NATS, AL NO EXPOERLO SE MEJORA LA SEGURIDAD
    # ports:
    #   - ${AUTH_MICROSERVICE_PORT}:3004
    volumes:
      - ./auth-microservice/src:/usr/src/app/src
    command: npm run start:dev
    environment:
    # creo que el puerto no es necesario ya que el microservicio de auth no va a escuchar en un puerto, sino que va a recibir mensajes a través de NATS, pero lo dejo por si acaso, aunque realmente no es necesario
      - PORT=${AUTH_MICROSERVICE_PORT}
      - NATS_SERVERS=nats://nats-server:4222
      # Prisma lee `DATABASE_URL` (ver auth-microservice/prisma.config.ts).
      # directConnection=true    => fuerza conexión directa a este nodo (útil cuando solo hay 1 nodo en el replica set)
      - DATABASE_URL=mongodb://mongo-database:27017/${MONGO_DB}?replicaSet=rs0&directConnection=true
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      nats-server:
        condition: service_started
      mongo-database:
        condition: service_healthy